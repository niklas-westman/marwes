pre-commit:
  parallel: true
  jobs:
    - name: biome-staged
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md}"
      run: corepack pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: repo-check
      run: corepack pnpm check
    - name: design-check
      run: corepack pnpm design:check
    - name: cohesive-check
      run: corepack pnpm cohesive:check:all
