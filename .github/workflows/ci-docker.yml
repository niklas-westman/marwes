name: Docker CI Image

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: docker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  meta:
    name: image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      can_push: ${{ steps.vars.outputs.can_push }}
      dep_changed: ${{ steps.changed.outputs.dep_changed }}
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        name: Create image metadata
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo}-ci:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          fi

      - id: changed
        name: Detect dependency inputs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          else
            before="${{ github.event.before }}"

            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              files="$(git diff --name-only "$before" "${GITHUB_SHA}" || true)"
            else
              files="$(git ls-files)"
            fi
          fi

          echo "$files"

          if echo "$files" | grep -Eq '(^|/)package.json$|^pnpm-lock.yaml$|^pnpm-workspace.yaml$|^\.npmrc$|^Dockerfile\.ci$|^\.dockerignore$'; then
            echo "dep_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "dep_changed=false" >> "$GITHUB_OUTPUT"
          fi

  workflow_syntax:
    name: workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: devops-actions/actionlint@v0.1.10

  dependency_security:
    name: dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.0.0 --activate

      - name: pnpm audit
        run: |
          pnpm audit --audit-level high
          pnpm audit --prod --audit-level high

  build_image:
    name: build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - meta
      - workflow_syntax
      - dependency_security
    if: needs.meta.outputs.can_push == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ needs.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ${{ needs.meta.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          {
            echo "## Docker CI image"
            echo ""
            echo "Image: \`${{ needs.meta.outputs.image }}\`"
            echo ""
            echo "Dependency inputs changed: \`${{ needs.meta.outputs.dep_changed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify_image:
    name: verify using image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - meta
      - build_image
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI checks inside image
        run: |
          docker run --rm "${{ needs.meta.outputs.image }}" sh -lc '
            set -e
            pnpm exec biome check .
            pnpm docs:links
            pnpm docs:api
            pnpm semantics:check
            pnpm artifacts:check
            pnpm registry:check
            pnpm storybook:consistency
            pnpm -r typecheck
            pnpm test:typecheck:contracts
            pnpm test:packages
            pnpm -r build
          '

  fork_pr_image:
    name: build and verify fork PR image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - meta
      - workflow_syntax
      - dependency_security
    if: needs.meta.outputs.can_push == 'false'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          load: true
          tags: marwes-ci:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha

      - name: Run CI checks inside local image
        run: |
          docker run --rm "marwes-ci:sha-${{ github.sha }}" sh -lc '
            set -e
            pnpm exec biome check .
            pnpm docs:links
            pnpm docs:api
            pnpm semantics:check
            pnpm artifacts:check
            pnpm registry:check
            pnpm storybook:consistency
            pnpm -r typecheck
            pnpm test:typecheck:contracts
            pnpm test:packages
            pnpm -r build
          '
