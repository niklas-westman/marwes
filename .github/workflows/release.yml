name: Release
# Post-merge workflow that runs CI checks and then publishes packages to npm
# Ensures code quality before releasing by running full CI suite first

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # Run CI checks on the merged code and upload build artifacts
  ci:
    uses: ./.github/workflows/_ci.yml
    with:
      upload-build: true

  # Publish packages to npm after CI passes
  release:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ci]

    steps:
      # Clone the repository with full git history for changelog generation
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pnpm package manager (reads version from packageManager field in package.json)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Install Node.js with dependency caching (NO registry-url to avoid conflicts)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Fail with clear setup guidance before npm or Changesets produce indirect auth errors
      - name: Validate release secrets
        env:
          CHANGESETS_PR_TOKEN: ${{ secrets.CHANGESETS_PR_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$CHANGESETS_PR_TOKEN" ]; then
            echo "::error::CHANGESETS_PR_TOKEN is required so generated release PRs trigger CI."
            exit 1
          fi

          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN is required to publish packages."
            exit 1
          fi

      # Configure npm authentication manually
      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      # Install all project dependencies using exact versions from pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile

      # Download build artifacts from CI job to avoid rebuilding
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: packages

      # Verify npm authentication works
      - name: Verify npm auth
        run: npm whoami

      # Create release PR or publish packages to npm using changesets
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
        env:
          # Use the dedicated token for release PR pushes; GITHUB_TOKEN pushes do not trigger CI.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PR_TOKEN }}
          # Release PR pushes happen after CI already passed in this workflow.
          LEFTHOOK: 0
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
