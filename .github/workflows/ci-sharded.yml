name: CI Sharded

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ci-sharded-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changed-scope:
    name: changed-scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Changed-scope validation
        run: pnpm check:changed -- --base origin/${{ github.base_ref }}

  changeset-check:
    name: changeset-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Require changeset for package changes
        env:
          CHANGESET_BASE_REF: origin/${{ github.base_ref }}
        run: node ./scripts/check-pr-changeset.mjs

  workflow-syntax:
    name: workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: devops-actions/actionlint@v0.1.10

  validate:
    name: validate / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CI: true
      CHECK_COMMAND: ${{ matrix.command }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: repo checks
            command: pnpm exec biome check . && pnpm check:repo-map
          - name: typecheck
            command: pnpm -r typecheck && pnpm test:typecheck:contracts
          - name: package tests
            command: pnpm test:packages
          - name: package build
            command: pnpm build:packages
          - name: app build
            command: pnpm build:apps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.name }}
        run: sh -lc "$CHECK_COMMAND"
