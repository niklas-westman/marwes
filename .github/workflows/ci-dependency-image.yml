name: Dependency Image CI

on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: dependency-image-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  meta:
    name: dependency image metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      can_push: ${{ steps.vars.outputs.can_push }}
      dependency_key: ${{ steps.vars.outputs.dependency_key }}
      image: ${{ steps.vars.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: vars
        name: Create dependency image metadata
        shell: bash
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"

          dependency_files="$(
            git ls-files \
              package.json \
              pnpm-lock.yaml \
              pnpm-workspace.yaml \
              Dockerfile.ci-deps \
              'packages/*/package.json' \
              'apps/*/package.json' \
              .npmrc
          )"

          dependency_key="$(
            {
              echo "node=24"
              echo "pnpm=9.0.0"
              echo "$dependency_files" | sort | xargs sha256sum
            } | sha256sum | cut -d " " -f 1
          )"

          image="ghcr.io/${repo}-ci-deps:deps-node24-pnpm9-${dependency_key}"

          echo "dependency_key=deps-node24-pnpm9-${dependency_key}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "can_push=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          fi

  workflow_syntax:
    name: workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: actionlint
        uses: devops-actions/actionlint@v0.1.10

  dependency_security:
    name: dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@9.0.0 --activate

      - name: pnpm audit
        run: |
          pnpm audit --audit-level high
          pnpm audit --prod --audit-level high

  ensure_dependency_image:
    name: ensure dependency image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - meta
      - workflow_syntax
      - dependency_security
    if: needs.meta.outputs.can_push == 'true'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ needs.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        name: Check dependency image
        shell: bash
        run: |
          if docker manifest inspect "${{ needs.meta.outputs.image }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push dependency image
        if: steps.image.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci-deps
          push: true
          tags: ${{ needs.meta.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Marwes pnpm dependency image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dependency image summary
        run: |
          {
            echo "## Dependency image"
            echo ""
            echo "Image: \`${{ needs.meta.outputs.image }}\`"
            echo ""
            echo "Key: \`${{ needs.meta.outputs.dependency_key }}\`"
            echo ""
            echo "Already existed: \`${{ steps.image.outputs.exists }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify_dependency_image:
    name: verify dependency image / ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - meta
      - ensure_dependency_image
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: repo checks
            command: pnpm exec biome check . && pnpm check:repo-map
          - name: typecheck
            command: pnpm -r typecheck && pnpm test:typecheck:contracts
          - name: tests
            command: pnpm test:packages
          - name: build
            command: pnpm -r build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run ${{ matrix.name }} inside dependency image
        env:
          CHECK_COMMAND: ${{ matrix.command }}
        run: |
          docker run --rm \
            -e CHECK_COMMAND \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${{ needs.meta.outputs.image }}" \
            sh -lc '
              set -e
              pnpm config set store-dir /pnpm/store
              pnpm install --offline --frozen-lockfile --ignore-scripts
              sh -lc "$CHECK_COMMAND"
            '

  fork_dependency_image:
    name: fork dependency image verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - meta
      - workflow_syntax
      - dependency_security
    if: needs.meta.outputs.can_push == 'false'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build local dependency image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci-deps
          load: true
          tags: marwes-ci-deps:${{ needs.meta.outputs.dependency_key }}
          cache-from: type=gha

      - name: Run CI checks inside local dependency image
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "marwes-ci-deps:${{ needs.meta.outputs.dependency_key }}" \
            sh -lc '
              set -e
              pnpm config set store-dir /pnpm/store
              pnpm install --offline --frozen-lockfile --ignore-scripts
              pnpm exec biome check .
              pnpm check:repo-map
              pnpm -r typecheck
              pnpm test:typecheck:contracts
              pnpm test:packages
              pnpm -r build
            '
